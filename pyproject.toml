[tool.poetry]
name = "pymbus"
version = "0.2.0"
description = "Python Meter-Bus Package"
authors = ["Stanley Kudrow <stankudrow@reply.no>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.10"


[tool.poetry.group.lint.dependencies]
mypy = "^1.11.2"
ruff = "^0.6.4"


[tool.poetry.group.test.dependencies]
pytest = "^8.3.2"
pytest-cov = "^5.0.0"
pytest-mock = "^3.14.0"
pytest-random-order = "^1.1.1"
pytest-xdist = "^3.6.1"

[tool.coverage.run]
branch = true

[tool.coverage.paths]
source = ["pymbus"]

[tool.coverage.report]
fail_under = 80
precision = 0
skip_covered = true
skip_empty = true
show_missing = true

[tool.coverage.html]
skip_empty = true
title = "Python Meter-Bus Coverage Report"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-s",
    "-vvv",
    "--cov=pymbus",
    "--maxfail=1",
    "--random-order",
    "--strict-config",
    "--strict-markers",
]
xfail_strict = true
testpaths = ["tests"]

[tool.ruff]
extend-exclude = [
    "assets",
]
line-length = 80
respect-gitignore = true
target-version = "py312"

[tool.ruff.lint]
extend-select = ["I", "F"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
